<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::content})}">
<body>
  <th:block th:fragment="content">
    <div class="p-8">
      <!-- Page Header -->
      <h1 class="text-2xl font-bold text-gray-800">Dashboard</h1>
      <p class="text-gray-500 mt-1">Welcome to Indorama Security Management System</p>

      <!-- KPI Cards Section -->
      <div class="grid grid-cols-4 gap-4 mb-6">
        <!-- Total Guards -->
        <div class="bg-white rounded-xl shadow p-5 relative">
          <div class="absolute top-4 right-4 w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center">
            <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
            </svg>
          </div>
          <p class="text-xs text-gray-400 uppercase tracking-wide">Total Guards</p>
          <p class="text-3xl font-bold text-blue-600 mt-1">48</p>
        </div>

        <!-- On Duty -->
        <div class="bg-white rounded-xl shadow p-5 relative">
          <div class="absolute top-4 right-4 w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center">
            <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
          </div>
          <p class="text-xs text-gray-400 uppercase tracking-wide">On Duty</p>
          <p class="text-3xl font-bold text-green-600 mt-1">36</p>
        </div>

        <!-- On EL -->
        <div class="bg-white rounded-xl shadow p-5 relative">
          <div class="absolute top-4 right-4 w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center">
            <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
          </div>
          <p class="text-xs text-gray-400 uppercase tracking-wide">On EL</p>
          <p class="text-3xl font-bold text-purple-600 mt-1">3</p>
        </div>

        <!-- On CL -->
        <div class="bg-white rounded-xl shadow p-5 relative">
          <div class="absolute top-4 right-4 w-10 h-10 bg-orange-100 rounded-lg flex items-center justify-center">
            <svg class="w-5 h-5 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
          </div>
          <p class="text-xs text-gray-400 uppercase tracking-wide">On CL</p>
          <p class="text-3xl font-bold text-orange-600 mt-1">2</p>
        </div>

        <!-- On ML -->
        <div class="bg-white rounded-xl shadow p-5 relative">
          <div class="absolute top-4 right-4 w-10 h-10 bg-teal-100 rounded-lg flex items-center justify-center">
            <svg class="w-5 h-5 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
          </div>
          <p class="text-xs text-gray-400 uppercase tracking-wide">On ML</p>
          <p class="text-3xl font-bold text-teal-600 mt-1">1</p>
        </div>

        <!-- Absent -->
        <div class="bg-white rounded-xl shadow p-5 relative">
          <div class="absolute top-4 right-4 w-10 h-10 bg-red-100 rounded-lg flex items-center justify-center">
            <svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </div>
          <p class="text-xs text-gray-400 uppercase tracking-wide">Absent</p>
          <p class="text-3xl font-bold text-red-600 mt-1">2</p>
        </div>

        <!-- On Rest -->
        <div class="bg-white rounded-xl shadow p-5 relative">
          <div class="absolute top-4 right-4 w-10 h-10 bg-indigo-100 rounded-lg flex items-center justify-center">
            <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
            </svg>
          </div>
          <p class="text-xs text-gray-400 uppercase tracking-wide">On Rest</p>
          <p class="text-3xl font-bold text-indigo-600 mt-1">5</p>
        </div>
      </div>

      <!-- Content sections will be added in subsequent tasks -->

      <!-- Current Duty Status Section -->
      <section class="bg-white rounded-xl shadow p-6 mt-6">
        <!-- Header with dropdown -->
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-lg font-bold text-gray-800">Current Duty Status</h2>
          <select id="siteSelector" class="border border-gray-300 rounded-md px-3 py-1 text-sm">
            <option value="plant" selected>Plant</option>
            <option value="township">Township</option>
          </select>
        </div>

        <!-- Duty Status Table -->
        <table class="w-full text-sm text-left text-gray-700">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 border-b">Ser No.</th>
              <th class="px-4 py-3 border-b">Location</th>
              <th class="px-4 py-3 border-b">A SHIFT</th>
              <th class="px-4 py-3 border-b">Ord</th>
              <th class="px-4 py-3 border-b">B SHIFT</th>
              <th class="px-4 py-3 border-b">Ord</th>
              <th class="px-4 py-3 border-b">C SHIFT</th>
              <th class="px-4 py-3 border-b">Ord</th>
            </tr>
          </thead>
          <tbody id="dutyTableBody">
            <tr th:each="duty : ${duties}">
              <td class="px-4 py-2 border-b" th:text="${duty.serNo}"></td>
              <td class="px-4 py-2 border-b" th:text="${duty.location}"></td>
              <td class="px-4 py-2 border-b text-blue-600" th:text="${duty.aShift}"></td>
              <td class="px-4 py-2 border-b" th:text="${duty.aOrd}"></td>
              <td class="px-4 py-2 border-b text-green-600" th:text="${duty.bShift}"></td>
              <td class="px-4 py-2 border-b" th:text="${duty.bOrd}"></td>
              <td class="px-4 py-2 border-b text-purple-600" th:text="${duty.cShift}"></td>
              <td class="px-4 py-2 border-b" th:text="${duty.cOrd}"></td>
            </tr>
          </tbody>
        </table>
      </section>

    </div>
    <script src="/static/js/dashboard.js"></script>
  </th:block>
</body>
</html>
